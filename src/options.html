<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auto Agent Tester Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Auto Agent Tester</h1>
        <p>LLM connection and host scope</p>
      </header>

      <form id="settingsForm" class="form">
        <label>
          <span>Base URL</span>
          <input id="baseUrl" type="url" required placeholder="https://api.openai.com/v1">
        </label>

        <label>
          <span>Model</span>
          <input id="model" type="text" required placeholder="gpt-4.1-mini or an OpenAI-compatible model">
        </label>

        <label>
          <span>API key</span>
          <input id="apiKey" type="password" autocomplete="off" placeholder="Stored locally in this browser">
        </label>

        <label>
          <span>Temperature</span>
          <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.1">
        </label>

        <label>
          <span>Allowed hosts</span>
          <textarea id="allowedHosts" rows="5" placeholder="Leave empty to allow all http/https hosts. One host per line, e.g. staging.example.com"></textarea>
        </label>

        <div class="actions">
          <button class="primary" type="submit">Save</button>
          <span id="status" role="status"></span>
        </div>
      </form>
    </main>

    <script src="options.js"></script>
  </body>
</html>
