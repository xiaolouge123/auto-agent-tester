<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auto Agent Tester</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1>Auto Agent Tester</h1>
          <p id="tabInfo">No active run</p>
        </div>
        <button id="openOptions" class="options-button" title="Options" aria-label="Options">Options</button>
      </header>

      <section class="field">
        <label for="goal">Goal</label>
        <textarea id="goal" rows="7" placeholder="Example: Search the product catalog for wireless keyboard, open the first result, and collect title, price, and availability. Batch template: {{prompt}}"></textarea>
      </section>

      <section class="run-bar">
        <label class="compact-field" for="maxStep">
          <span>Max Step</span>
          <input id="maxStep" type="number" min="1" max="100" value="100">
        </label>
        <button id="startRun" class="primary">Start</button>
        <button id="stopRun" disabled>Stop</button>
      </section>

      <section class="status-line">
        <span id="statusDot" class="dot idle"></span>
        <span id="statusText">Idle</span>
      </section>

      <section class="batch-panel">
        <div class="batch-header">
          <h2>Batch</h2>
          <span id="batchStatus">No batch file</span>
        </div>
        <label class="file-field" for="batchFile">
          <span>CSV or XLSX</span>
          <input id="batchFile" type="file" accept=".csv,text/csv,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
        </label>
        <div class="batch-grid">
          <label class="compact-field" for="batchIdField">
            <span>ID Field</span>
            <input id="batchIdField" type="text" value="id">
          </label>
          <label class="compact-field" for="batchPromptField">
            <span>Prompt Field</span>
            <input id="batchPromptField" type="text" value="prompt">
          </label>
          <button id="startBatch" disabled>Start Batch</button>
        </div>
      </section>

      <section class="output">
        <div class="output-header">
          <h2>Run Log</h2>
          <button id="clearLog">Clear</button>
        </div>
        <ol id="log" class="log"></ol>
      </section>

      <section class="output">
        <div class="output-header">
          <h2>Result</h2>
          <div class="output-actions">
            <button id="copyResult" disabled>Copy Summary</button>
            <button id="exportResult" disabled>Download JSON</button>
            <button id="downloadRecording" disabled>Download Recording</button>
          </div>
        </div>
        <pre id="result" class="result"></pre>
      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
